version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: nebula-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-nebula}
      POSTGRES_USER: ${DB_USER:-nebula}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nebula-dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nebula-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nebula}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:v1.7.0
    container_name: nebula-qdrant
    restart: unless-stopped
    environment:
      QDRANT_API_KEY: ${QDRANT_API_KEY:-nebula-qdrant-key}
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - nebula-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    # command: ./qdrant --api-key ${QDRANT_API_KEY:-nebula-qdrant-key}

  # Ollama LLM Runtime
  ollama:
    image: ollama/ollama:latest
    container_name: nebula-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - nebula-network
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
    # For GPU support, uncomment the following:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # NestJS Backend (optional - for docker-compose up to start everything)
  # Uncomment after backend is ready
  # backend:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: nebula-backend
  #   restart: unless-stopped
  #   environment:
  #     NODE_ENV: ${NODE_ENV:-development}
  #     DATABASE_URL: postgresql://${DB_USER:-nebula}:${DB_PASSWORD:-nebula-dev}@postgres:5432/${DB_NAME:-nebula}
  #     QDRANT_URL: http://qdrant:6333
  #     OLLAMA_BASE_URL: http://ollama:11434
  #     JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
  #     STORAGE_TYPE: ${STORAGE_TYPE:-local}
  #     STORAGE_LOCAL_PATH: ${STORAGE_LOCAL_PATH:-/tmp/nebula-files}
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     qdrant:
  #       condition: service_healthy
  #     ollama:
  #       condition: service_healthy
  #   networks:
  #     - nebula-network
  #   volumes:
  #     - ./src:/app/src
  #   command: npm run start:dev

networks:
  nebula-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  qdrant_data:
    driver: local
  ollama_data:
    driver: local
